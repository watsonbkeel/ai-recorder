services:
  mysql:
    image: mysql:8.0
    container_name: ai-recorder-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ai_recorder
      MYSQL_USER: ai_recorder_user
      MYSQL_PASSWORD: ai_recorder_password_change_me
      MYSQL_ROOT_PASSWORD: root_password_change_me
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ai_recorder_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password_change_me"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ai_recorder_mysql_data:
